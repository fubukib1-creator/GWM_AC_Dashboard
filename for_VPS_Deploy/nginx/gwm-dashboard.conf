# =============================================================================
#  GWM x Innopower — Nginx config
#  Place at: /etc/nginx/sites-available/gwm-dashboard
#  Enable:   sudo ln -s /etc/nginx/sites-available/gwm-dashboard /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 8080;
    server_name _;

    root /var/www/gwm;
    charset utf-8;

    # ops team เท่านั้น — ใช้ .htpasswd-ops
    location /Dashboard/v3/ {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd-ops;
        try_files $uri $uri/ =404;
    }

    # GWM exec เท่านั้น — ใช้ .htpasswd-exec
    location /Dashboard/v4-gwm/ {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd-exec;
        try_files $uri $uri/ =404;
    }

    # data ไม่ต้อง auth — JS dashboard โหลดตรงนี้
    location /data/ {
        try_files $uri =404;
    }

    # block ทุกอย่างที่ไม่ได้ระบุ
    location / {
        return 404;
    }
}
