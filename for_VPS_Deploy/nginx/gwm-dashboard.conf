# =============================================================================
#  GWM x Innopower — Nginx config
#  Place at: /etc/nginx/sites-available/gwm-dashboard
#  Enable:   sudo ln -s /etc/nginx/sites-available/gwm-dashboard /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name _;          # ใส่ IP หรือ domain จริงตรงนี้ เช่น 123.45.67.89

    root /var/www/gwm;
    charset utf-8;

    # ── Ops Dashboard (v3) — ops team only ──────────────────────────────────
    # แชร์ URL นี้ให้แค่ทีม ops: http://<IP>/Dashboard/v3/
    location /Dashboard/v3/ {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ =404;
    }

    # ── Executive Dashboard (v4-gwm) — ops + GWM exec ───────────────────────
    # แชร์ URL นี้ให้ผู้บริหาร GWM: http://<IP>/Dashboard/v4-gwm/
    location /Dashboard/v4-gwm/ {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ =404;
    }

    # ── Snapshot data — dashboard JS โหลดจากนี้ ────────────────────────────
    # ต้องใช้ realm เดียวกับ dashboard เพื่อให้ browser ไม่ prompt ซ้ำ
    location /data/ {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri =404;
    }

    # ── Static reference pages (ไม่มีข้อมูล ไม่ต้อง auth) ──────────────────
    location /Dashboard/sla-requirements.html {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri =404;
    }

    location /Dashboard/case-classification-tree.html {
        auth_basic "GWM Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri =404;
    }

    # ── Block ทุกอย่างที่ไม่ได้ระบุ (scripts/, design/, ฯลฯ) ────────────────
    location / {
        return 404;
    }
}
